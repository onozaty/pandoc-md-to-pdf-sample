name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Convert Markdown to PDF
        run: bash convert.sh

      - name: Zip PDFs
        run: zip -j output/documents.zip output/*.pdf

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: output/documents.zip
